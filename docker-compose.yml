version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: agentfarm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentfarm
      POSTGRES_USER: agentfarm
      POSTGRES_PASSWORD: agentfarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agentfarm_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentfarm -d agentfarm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agentfarm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentfarm_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agentfarm_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - agentfarm_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentfarm_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    networks:
      - agentfarm_net

networks:
  agentfarm_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
