name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-test:
    name: Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: agentfarm_test
          POSTGRES_USER: agentfarm
          POSTGRES_PASSWORD: agentfarm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentfarm -d agentfarm_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://agentfarm:agentfarm@localhost:5432/agentfarm_test
      REDIS_URL: redis://localhost:6379/0
      OPENWEATHER_API_KEY: test_key
      OPENAI_API_KEY: test_key
      ENV: test
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run pytest with coverage
        working-directory: backend
        run: pytest --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend-test:
    name: Frontend (build + test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: npm run build

      - name: Test (non-failing if no test script)
        working-directory: frontend
        run: |
          if npm run | grep -qE "^  test"; then
            npm test -- --watchAll=false --passWithNoTests
          else
            echo "No test script defined — skipping."
          fi
